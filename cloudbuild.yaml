steps:
  # ─── BACKEND ────────────────────────────────────────────────────────────────

  # Build Backend Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/voting-backend:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/voting-backend:latest'
      - '.'
    dir: 'backend'

  # Push Backend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/voting-backend']

  # Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'voting-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/voting-backend:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GEMINI_API_KEY=$$GEMINI_API_KEY,JWT_SECRET=$$JWT_SECRET'
    secretEnv: ['GEMINI_API_KEY', 'JWT_SECRET']

  # ─── FRONTEND ───────────────────────────────────────────────────────────────

  # Get backend URL and build frontend image
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        BACKEND_URL=$(gcloud run services describe voting-backend \
          --region us-central1 \
          --format 'value(status.url)')
        docker build \
          --build-arg VITE_API_URL=$${BACKEND_URL} \
          -t gcr.io/$PROJECT_ID/voting-frontend:$SHORT_SHA \
          -t gcr.io/$PROJECT_ID/voting-frontend:latest \
          ./frontend

  # Push Frontend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/voting-frontend']

  # Deploy Frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'voting-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/voting-frontend:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GEMINI_API_KEY/versions/latest
      env: 'GEMINI_API_KEY'
    - versionName: projects/$PROJECT_ID/secrets/JWT_SECRET/versions/latest
      env: 'JWT_SECRET'

images:
  - 'gcr.io/$PROJECT_ID/voting-backend:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/voting-backend:latest'
  - 'gcr.io/$PROJECT_ID/voting-frontend:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/voting-frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
